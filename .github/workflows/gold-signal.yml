name: Gold WaveAnalyzer
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Wave Analyzer
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_KEY }}
        run: bash trader/wave_analyzer.sh
